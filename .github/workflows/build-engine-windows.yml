name: build-engine-windows

# Builds OUR OWN WinCairo WebKit engine FROM SOURCE on a provisioned Windows
# runner, relocates it into the Bunmaska engine-store layout, and proves it loads
# from the store — the Windows peer of `build-engine.yml` (which relocates apt's
# WebKitGTK on Linux). Windows has no system WebKit and we will never ship
# Playwright's build, so the engine is our own from-source binary. This is heavy
# (a full WebKit compile is ~hours and GBs), so it runs on demand / on the engine
# branch only — never on every push.
on:
  workflow_dispatch:
    inputs:
      webkit_tag:
        description: 'WebKit git tag to build (e.g. webkitgtk-2.46.0)'
        required: true
        default: 'webkitgtk-2.46.0'
  push:
    branches: [feat/windows-engine]

jobs:
  build:
    name: build WinCairo from source (windows)
    runs-on: windows-latest
    # A full WebKit compile is long; cap well under GitHub's 6h ceiling so a hang
    # fails rather than burning the whole budget.
    timeout-minutes: 350
    env:
      WEBKIT_TAG: ${{ github.event.inputs.webkit_tag || 'webkitgtk-2.46.0' }}
    steps:
      - name: Checkout bunmaska
        uses: actions/checkout@v4
        with:
          path: bunmaska

      # Shallow-clone WebKit at the pinned tag — the full history is enormous and a
      # build only needs the tree at that revision.
      - name: Checkout WebKit at the pinned tag
        run: |
          git clone --depth 1 --branch "$env:WEBKIT_TAG" https://github.com/WebKit/WebKit.git WebKit
        shell: pwsh

      # CMake + Visual Studio are preinstalled on windows-latest; WebKit also needs
      # Ninja, Perl, and Ruby for its build scripts.
      - name: Install build tools (ninja, perl, ruby)
        run: |
          choco install -y ninja strawberryperl ruby
        shell: pwsh

      # WebKit's build drives MSVC; put the x64 toolchain on PATH.
      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # build-webkit --wincairo generates the CMake project, auto-fetches the
      # WinCairoRequirements dependency bundle (ICU, libcurl, ANGLE, …), and builds
      # WebKit2.dll + the helper processes into WebKitBuild/Release/bin64.
      - name: Build WebKit (WinCairo, Release)
        working-directory: WebKit
        run: |
          perl Tools/Scripts/build-webkit --wincairo --release
        shell: pwsh

      - name: Compute the engine id from the tag
        id: id
        run: |
          $ver = "$env:WEBKIT_TAG" -replace '^webkitgtk-', ''
          $engineId = "webkit-2-$ver-bunmaska1-windows-x64"
          "engine_id=$engineId" >> $env:GITHUB_OUTPUT
          Write-Host "Engine id: $engineId"
        shell: pwsh

      # Relocate the build output into the store layout (the same script used and
      # proven locally), then mark it installed.
      - name: Relocate into the engine store
        run: |
          $store = "$env:RUNNER_TEMP\store"
          $bin = "$env:GITHUB_WORKSPACE\WebKit\WebKitBuild\Release\bin64"
          & bunmaska/packages/bunmaska/tools/engine/build-wincairo-windows.ps1 `
            -Source $bin -OutDir $store -EngineId "${{ steps.id.outputs.engine_id }}"
          New-Item -ItemType File -Force `
            -Path "$store\${{ steps.id.outputs.engine_id }}\INSTALLATION_COMPLETE" | Out-Null
        shell: pwsh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: bunmaska/.bun-version

      - name: Install bun deps
        working-directory: bunmaska
        run: bun install --frozen-lockfile

      # Prove the relocated engine works resolved purely from the store (no
      # BUNMASKA_WEBKIT_PATH): a real BrowserWindow + executeJavaScript.
      - name: Prove it loads from the store
        working-directory: bunmaska/packages/bunmaska
        env:
          BUNMASKA_ENGINES_PATH: ${{ runner.temp }}\store
          BUNMASKA_WEBKIT_ID: ${{ steps.id.outputs.engine_id }}
        run: |
          $out = bun run tools/engine/windows-engine-load-probe.ts 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch 'STORE_ENGINE_OK') {
            Write-Error "engine did not load from the store"
            exit 1
          }
        shell: pwsh

      - name: Upload the engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.id.outputs.engine_id }}
          path: ${{ runner.temp }}\store\${{ steps.id.outputs.engine_id }}
          retention-days: 7
