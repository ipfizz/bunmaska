name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Hard ceiling so a hung native/FFI call (e.g. a blocking GIO read deadlocking
    # the GTK main loop) fails fast instead of burning hours up to GitHub's 6h cap.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native deps (GTK 4 + WebKitGTK 6.0 + libnotify + Xvfb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-1 libwebkitgtk-6.0-4 libnotify4 xvfb

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # WebKitGTK's bubblewrap sandbox and GPU acceleration are unavailable on
      # the headless runner; disable them so the GTK/WebKitGTK tests can run.
      - name: Validate (Linux — under Xvfb for GTK tests)
        if: runner.os == 'Linux'
        env:
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GDK_BACKEND: x11
        run: xvfb-run -a bun run validate

      - name: Validate (macOS)
        if: runner.os == 'macOS'
        run: bun run validate
