name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native deps (GTK 4 + WebKitGTK 6.0 + Xvfb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-1 libwebkitgtk-6.0-4 xvfb

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate (Linux — under Xvfb for GTK tests)
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run validate

      - name: Validate (macOS)
        if: runner.os == 'macOS'
        run: bun run validate
